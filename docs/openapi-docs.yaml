  /notes/create:
    post:
      operationId: post___notes___create
      summary: notes/create
      description: |-
        No description provided.

        **Credential required**: *Yes* / **Permission**: *write:notes*
      externalDocs:
        description: Source code
        url: https://github.com/lqvp/misskey-tempura/blob/develop/packages/backend/src/server/api/endpoints/notes/create.ts
      tags:
        - notes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                visibility:
                  type: string
                  enum:
                    - public
                    - public_non_ltl
                    - home
                    - followers
                    - specified
                  default: public
                visibleUserIds:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                    format: misskey:id
                cw:
                  type:
                    - string
                    - "null"
                  maxLength: 100
                localOnly:
                  type: boolean
                  default: false
                reactionAcceptance:
                  type:
                    - string
                    - "null"
                  enum:
                    - null
                    - likeOnly
                    - likeOnlyForRemote
                    - nonSensitiveOnly
                    - nonSensitiveOnlyForLocalLikeOnlyForRemote
                  default: null
                noExtractMentions:
                  type: boolean
                  default: false
                noExtractHashtags:
                  type: boolean
                  default: false
                noExtractEmojis:
                  type: boolean
                  default: false
                replyId:
                  type:
                    - string
                    - "null"
                  format: misskey:id
                renoteId:
                  type:
                    - string
                    - "null"
                  format: misskey:id
                channelId:
                  type:
                    - string
                    - "null"
                  format: misskey:id
                text:
                  type:
                    - string
                    - "null"
                  minLength: 1
                  maxLength: 8192
                fileIds:
                  type: array
                  uniqueItems: true
                  minItems: 1
                  maxItems: 16
                  items:
                    type: string
                    format: misskey:id
                mediaIds:
                  type: array
                  uniqueItems: true
                  minItems: 1
                  maxItems: 16
                  items:
                    type: string
                    format: misskey:id
                poll:
                  type:
                    - object
                    - "null"
                  properties:
                    choices:
                      type: array
                      uniqueItems: true
                      minItems: 2
                      maxItems: 10
                      items:
                        type: string
                        minLength: 1
                        maxLength: 50
                    multiple:
                      type: boolean
                    expiresAt:
                      type:
                        - integer
                        - "null"
                    expiredAfter:
                      type:
                        - integer
                        - "null"
                      minimum: 1
                  required:
                    - choices
                scheduledDelete:
                  type:
                    - object
                    - "null"
                  properties:
                    deleteAt:
                      type:
                        - integer
                        - "null"
                    deleteAfter:
                      type:
                        - integer
                        - "null"
                      minimum: 1
                    isScheduledForPrivate:
                      type:
                        - boolean
                        - "null"
                deliveryTargets:
                  type:
                    - object
                    - "null"
                  properties:
                    mode:
                      type: string
                      enum:
                        - include
                        - exclude
                    hosts:
                      type: array
                      items:
                        type: string
                      uniqueItems: true
                  required:
                    - mode
                    - hosts
              if:
                properties:
                  renoteId:
                    type: "null"
                  fileIds:
                    type: "null"
                  mediaIds:
                    type: "null"
                  poll:
                    type: "null"
              then:
                properties:
                  text:
                    type: string
                    minLength: 1
                    maxLength: 8192
                    pattern: "[^\\s]+"
                required:
                  - text
      responses:
        "200":
          description: OK (with results)
          content:
            application/json:
              schema:
                type: object
                properties:
                  createdNote:
                    $ref: "#/components/schemas/Note"
                required:
                  - createdNote
