  /admin/abuse-user-reports:
    post:
      operationId: post___admin___abuse-user-reports
      summary: admin/abuse-user-reports
      description: >-
        No description provided.


        **Credential required**: *Yes* / **Permission**:
        *read:admin:abuse-user-reports*
      externalDocs:
        description: Source code
        url: https://github.com/lqvp/misskey-tempura/blob/develop/packages/backend/src/server/api/endpoints/admin/abuse-user-reports.ts
      tags:
        - admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 10
                sinceId:
                  type: string
                  format: misskey:id
                untilId:
                  type: string
                  format: misskey:id
                sinceDate:
                  type: integer
                untilDate:
                  type: integer
                state:
                  type:
                    - string
                    - "null"
                  default: null
                reporterOrigin:
                  type: string
                  enum:
                    - combined
                    - local
                    - remote
                  default: combined
                targetUserOrigin:
                  type: string
                  enum:
                    - combined
                    - local
                    - remote
                  default: combined
      responses:
        "200":
          description: OK (with results)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: id
                      example: xxxxxxxxxx
                    createdAt:
                      type: string
                      format: date-time
                    comment:
                      type: string
                    resolved:
                      type: boolean
                      example: false
                    reporterId:
                      type: string
                      format: id
                    targetUserId:
                      type: string
                      format: id
                    assigneeId:
                      type:
                        - string
                        - "null"
                      format: id
                    reporter:
                      $ref: "#/components/schemas/UserDetailedNotMe"
                    targetUser:
                      $ref: "#/components/schemas/UserDetailedNotMe"
                    assignee:
                      oneOf:
                        - $ref: "#/components/schemas/UserDetailedNotMe"
                        - type: "null"
                    forwarded:
                      type: boolean
                    resolvedAs:
                      type:
                        - string
                        - "null"
                      enum:
                        - accept
                        - reject
                        - null
                    moderationNote:
                      type: string
                  required:
                    - id
                    - createdAt
                    - comment
                    - resolved
                    - reporterId
                    - targetUserId
                    - assigneeId
                    - reporter
                    - targetUser
                    - assignee
                    - forwarded
                    - resolvedAs
                    - moderationNote
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                INVALID_PARAM:
                  value:
                    error:
                      message: Invalid param.
