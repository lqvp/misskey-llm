        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                visibility:
                  type: string
                  enum:
                    - public
                    - home
                    - followers
                    - specified
                    - public_non_ltl
                  default: public
                visibleUserIds:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                    format: misskey:id
                cw:
                  type:
                    - string
                    - "null"
                  minLength: 1
                  maxLength: 100
                hashtag:
                  type:
                    - string
                    - "null"
                  maxLength: 200
                localOnly:
                  type: boolean
                  default: false
                reactionAcceptance:
                  type:
                    - string
                    - "null"
                  enum:
                    - null
                    - likeOnly
                    - likeOnlyForRemote
                    - nonSensitiveOnly
                    - nonSensitiveOnlyForLocalLikeOnlyForRemote
                  default: null
                replyId:
                  type:
                    - string
                    - "null"
                  format: misskey:id
                renoteId:
                  type:
                    - string
                    - "null"
                  format: misskey:id
                channelId:
                  type:
                    - string
                    - "null"
                  format: misskey:id
                text:
                  type:
                    - string
                    - "null"
                  minLength: 0
                  maxLength: 8192
                fileIds:
                  type: array
                  uniqueItems: true
                  minItems: 0
                  maxItems: 16
                  items:
                    type: string
                    format: misskey:id
                poll:
                  type:
                    - object
                    - "null"
                  properties:
                    choices:
                      type: array
                      uniqueItems: true
                      minItems: 0
                      maxItems: 10
                      items:
                        type: string
                        minLength: 1
                        maxLength: 50
                    multiple:
                      type: boolean
                    expiresAt:
                      type:
                        - integer
                        - "null"
                    expiredAfter:
                      type:
                        - integer
                        - "null"
                      minimum: 1
                  required:
                    - choices
                scheduledAt:
                  type:
                    - integer
                    - "null"
                isActuallyScheduled:
                  type: boolean
                  default: false
      responses:
        "200":
          description: OK (with results)
          content:
            application/json:
              schema:
                type: object
                properties:
                  createdDraft:
                    $ref: "#/components/schemas/NoteDraft"
                required:
                  - createdDraft
